<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="flowGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4EC5F1" stop-opacity="0.18" />
      <stop offset="54%" stop-color="#73F0B8" stop-opacity="0.09" />
      <stop offset="100%" stop-color="#F7B955" stop-opacity="0.08" />
    </linearGradient>
    <filter id="softAccent" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
      <feFlood flood-color="#73F0B8" flood-opacity="0.28" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
