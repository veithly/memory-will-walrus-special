    <text x="260" y="575" font-family="Aptos, 'Microsoft YaHei', Arial, sans-serif" font-size="19" font-weight="800" fill="#EAF1F7">If Walrus write or read fails, Memory Will does not fake success.</text>
    <text x="260" y="601" font-family="Aptos, 'Microsoft YaHei', Arial, sans-serif" font-size="16" fill="#A8B6C6">The successor is gated on a real storage pointer, not on hidden local state.</text>
  </g>
  <g id="footer">
    <text x="56" y="672" font-family="Aptos, 'Microsoft YaHei', Arial, sans-serif" font-size="16" fill="#A8B6C6">This is why the Walrus primitive changes the product behavior: it is required before restore.</text>
  </g>
