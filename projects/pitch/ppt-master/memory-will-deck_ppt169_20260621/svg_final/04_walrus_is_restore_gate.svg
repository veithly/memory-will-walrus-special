<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="gateBeam" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#4EC5F1" stop-opacity="0" />
      <stop offset="43%" stop-color="#4EC5F1" stop-opacity="0.28" />
      <stop offset="57%" stop-color="#73F0B8" stop-opacity="0.26" />
      <stop offset="100%" stop-color="#73F0B8" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="gateGlow" cx="50%" cy="46%" r="42%">
      <stop offset="0%" stop-color="#73F0B8" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#73F0B8" stop-opacity="0" />
    </radialGradient>
    <filter id="gateFilter" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
      <feFlood flood-color="#4EC5F1" flood-opacity="0.36" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
