    <text x="104" y="360" font-family="'Aptos Display', 'Microsoft YaHei', Arial, sans-serif" font-size="27" font-weight="800" fill="#EAF1F7">Kill Agent</text>
    <text font-family="Aptos, 'Microsoft YaHei', Arial, sans-serif" fill="#A8B6C6" font-size="17" x="104" y="402">The predecessor stops.</text><text font-family="Aptos, 'Microsoft YaHei', Arial, sans-serif" fill="#A8B6C6" font-size="17" x="104" y="428">The judge chooses what</text><text font-family="Aptos, 'Microsoft YaHei', Arial, sans-serif" fill="#A8B6C6" font-size="17" x="104" y="454">can survive.</text></g>
