    <text font-family="Aptos, 'Microsoft YaHei', Arial, sans-serif" fill="#A8B6C6" font-size="17" x="680" y="402">A cold successor reads</text><text font-family="Aptos, 'Microsoft YaHei', Arial, sans-serif" fill="#A8B6C6" font-size="17" x="680" y="428">the Walrus blob before</text><text font-family="Aptos, 'Microsoft YaHei', Arial, sans-serif" fill="#A8B6C6" font-size="17" x="680" y="454">producing output.</text></g>
